<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0B1628"/>
  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(0,201,177,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Teal radial glow -->
  <radialGradient id="glow" cx="75%" cy="25%" r="50%">
    <stop offset="0%" stop-color="#00C9B1" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#00C9B1" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Logo mark -->
  <rect x="80" y="72" width="56" height="56" rx="12" fill="#00C9B1"/>
  <text x="108" y="115" font-family="system-ui, sans-serif" font-weight="800" font-size="32" fill="#0B1628" text-anchor="middle">B</text>
  <!-- Company name -->
  <text x="152" y="112" font-family="system-ui, sans-serif" font-weight="700" font-size="34" fill="#FFFFFF">BillingAlign</text>
  <!-- Divider -->
  <line x1="80" y1="160" x2="1120" y2="160" stroke="rgba(0,201,177,0.2)" stroke-width="1"/>
  <!-- Headline -->
  <text x="80" y="280" font-family="system-ui, sans-serif" font-weight="800" font-size="72" fill="#FFFFFF">Aligned Billing.</text>
  <text x="80" y="370">
    <tspan font-family="system-ui, sans-serif" font-weight="800" font-size="72" fill="#00C9B1">Accelerated Revenue.</tspan>
  </text>
  <!-- Subheadline -->
  <text x="80" y="440" font-family="system-ui, sans-serif" font-weight="400" font-size="28" fill="#94A3B8">Full-service medical billing &amp; RCM for 50+ healthcare specialties.</text>
  <!-- Stats row -->
  <text x="80" y="540" font-family="system-ui, sans-serif" font-weight="700" font-size="22" fill="#00C9B1">94%+ First-Pass Rate</text>
  <text x="80" y="570" font-family="system-ui, sans-serif" font-weight="400" font-size="18" fill="#94A3B8">HIPAA Compliant · AAPC Certified · 500+ Practices</text>
  <!-- Domain -->
  <text x="1120" y="580" font-family="system-ui, sans-serif" font-weight="400" font-size="20" fill="#94A3B8" text-anchor="end">BillingAlign.com</text>
</svg>
